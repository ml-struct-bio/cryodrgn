name: CI Testing

on:
  push:
    branches: [ develop ]
    tags:
      - '[0-9]+\.[0-9]+\.[0-9]+'
      - '[0-9]+\.[0-9]+\.[0-9]+-*'
  pull_request:
    branches: [ main ]

jobs:
  run_tests:

    runs-on: ${{ matrix.os }}
    # Stabilize MKL / OpenMP when pytest-xdist runs multiple workers importing PyTorch.
    # Without this, CI can intermittently hit: "Intel MKL FATAL ERROR: Cannot load ... libtorch_cpu.so".
    env:
      OMP_NUM_THREADS: 1
      MKL_NUM_THREADS: 1
      MKL_THREADING_LAYER: GNU
      OPENBLAS_NUM_THREADS: 1
      NUMEXPR_NUM_THREADS: 1
    strategy:
      matrix:
        python: [ '3.10', '3.11' , '3.12' , '3.13' ]
        os: [ macos-latest, ubuntu-latest ]
        include:
          - python: '3.10'
            torch: '2.0'
          - python: '3.11'
            torch: '2.3'
          - python: '3.12'
            torch: '2.6'
          - python: '3.13'
            torch: '2.9'
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install cryoDRGN with pytest dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install ".[dev]"
          # Pin torch for this matrix cell without uninstall/cache churn (cleaner than
          # uninstall + cache purge + reinstall, which can exacerbate flaky loads).
          python3 -m pip install --force-reinstall --no-cache-dir "torch==${{ matrix.torch }}"

      - name: Pytest
        run: |
          pytest -v -n2 --dist=loadscope --show-capture=stderr
